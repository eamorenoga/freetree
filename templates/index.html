<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <title>Mis Enlaces</title>
</head>
<body>
    <h1>Mis Enlaces</h1>

    <form action="{{ url_for('add_link') }}" method="post">
        <label for="site-name">Nombre del sitio</label>
        <input id="site-name" name="site_name" type="text" required>

        <label for="site-url">URL</label>
        <input id="site-url" name="site_url" type="url" required>

        <button type="submit">añadir la URL</button>
    </form>

    <ul>
        {% for link in links %}
        <li><a href="{{ link.url }}">{{ link.name }}</a></li>
        {% endfor %}
    </ul>
</body>
</html>
