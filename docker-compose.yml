services:
  postgres:
    image: postgres:16-alpine
    container_name: terrabiocol-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: terrabiocol
      POSTGRES_PASSWORD: terrabiocol
      POSTGRES_DB: terrabiocol
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
