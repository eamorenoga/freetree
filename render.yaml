services:
  - type: web
    name: terrabiocol
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    preDeployCommand: npm run db:migrate:deploy && npm run db:seed
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: terrabiocol-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        value: https://terrabiocol.onrender.com

databases:
  - name: terrabiocol-db
    databaseName: terrabiocol
    user: terrabiocol
    plan: free
